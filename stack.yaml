# This file was automatically generated by stack init.
# GHC project, see https://docs.haskellstack.org/en/stable/GUIDE/

resolver: lts-21.25 # Or the latest LTS Haskell version

packages:
- .

# Allows for testing individual components more easily
extra-deps: []

flags:
  # Allows to choose between multiple implementations or features
  # haskell-foundations-module: # Example flag definition
  #   feature-x: false

# Configure GHC options for your project. Stack will automatically use these options for your project. 
# For more information, see https://docs.haskellstack.org/en/stable/yaml_configuration/#ghc-options
ghc-options:
  "$everything": -Wall -Werror -threaded -rtsopts -with-rtsopts=-N
